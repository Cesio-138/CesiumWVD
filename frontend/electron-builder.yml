appId: com.cesiumwvd.app
productName: CesiumWVD
icon: assets/icon.png

directories:
  output: ../release

files:
  - dist/**/*
  - dist-electron/**/*

extraResources:
  - from: ../src
    to: backend/src
    filter:
      - "**/*.py"
  - from: ../venv-wvd
    to: backend/venv-wvd
    filter:
      - "**/*"
  - from: ../requirements.txt
    to: backend/requirements.txt
  - from: assets/icon.png
    to: icon.png

linux:
  target:
    - AppImage
  category: Utility
  icon: assets/icon.png

win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CesiumWVD
